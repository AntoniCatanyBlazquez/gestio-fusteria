<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Nova entrada - Gestió Fusteria</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>body { background-color: #f5f0eb; }</style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4" style="max-width: 600px;">
    <h2 style="color: #5D4037;">Nova entrada al calendari</h2>
    <hr>
    <form th:action="@{/calendari/nou}" method="post">
        <div class="mb-3">
            <label class="form-label">Títol <span class="text-danger">*</span></label>
            <input type="text" name="titol" class="form-control" required placeholder="Ex: Reunió amb client">
        </div>
        <div class="mb-3">
            <label class="form-label">Treball associat <span class="text-danger">*</span></label>
            <select name="treballId" class="form-select" required>
                <option value="">-- Selecciona un treball --</option>
                <option th:each="t : ${treballs}" th:value="${t.id}" th:text="${t.titol}"></option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Data <span class="text-danger">*</span></label>
            <input type="date" name="dateEntrada" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Comentaris</label>
            <textarea name="comentaris" class="form-control" rows="3" placeholder="Notes o comentaris..."></textarea>
        </div>
        <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn" style="background-color: #795548; color: white;">Guardar</button>
            <a th:href="@{/calendari}" class="btn btn-outline-secondary">Cancel·lar</a>
        </div>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
