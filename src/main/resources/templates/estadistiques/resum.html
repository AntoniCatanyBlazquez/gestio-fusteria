<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Estadístiques - Gestió Fusteria</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>body { background-color: #f5f0eb; }</style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">
    <h2 style="color: #5D4037;">Estadístiques</h2>
    <hr>

    <!-- Resum de treballs -->
    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="card shadow-sm text-center">
                <div class="card-body">
                    <h5 class="card-title text-muted">Total treballs</h5>
                    <p class="display-6 fw-bold" style="color: #5D4037;" th:text="${totalTreballs}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card shadow-sm text-center">
                <div class="card-body">
                    <h5 class="card-title text-muted">Pendents</h5>
                    <p class="display-6 fw-bold text-warning" th:text="${pendents}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card shadow-sm text-center">
                <div class="card-body">
                    <h5 class="card-title text-muted">En curs</h5>
                    <p class="display-6 fw-bold text-primary" th:text="${enCurs}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card shadow-sm text-center">
                <div class="card-body">
                    <h5 class="card-title text-muted">Finalitzats</h5>
                    <p class="display-6 fw-bold text-success" th:text="${finalitzats}">0</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Ingressos totals -->
    <div class="card shadow-sm mb-4">
        <div class="card-body text-center">
            <h5 class="text-muted">Ingressos totals (treballs finalitzats)</h5>
            <p class="display-5 fw-bold" style="color: #388E3C;" th:text="${ingressosTotals + ' €'}">0 €</p>
        </div>
    </div>

    <div class="row g-4">
        <!-- Ingressos per client -->
        <div class="col-md-6">
            <div class="card shadow-sm h-100">
                <div class="card-header" style="background-color: #795548; color: white;">Ingressos per client</div>
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr><th>Client</th><th class="text-end">Import (€)</th></tr>
                        </thead>
                        <tbody>
                            <tr th:each="entry : ${perClient}">
                                <td th:text="${entry.key}"></td>
                                <td class="text-end fw-bold" th:text="${entry.value + ' €'}"></td>
                            </tr>
                            <tr th:if="${#maps.size(perClient) == 0}">
                                <td colspan="2" class="text-center text-muted py-3">Sense dades</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Ingressos per mes -->
        <div class="col-md-6">
            <div class="card shadow-sm h-100">
                <div class="card-header" style="background-color: #795548; color: white;">Ingressos per mes</div>
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr><th>Mes</th><th class="text-end">Import (€)</th></tr>
                        </thead>
                        <tbody>
                            <tr th:each="entry : ${perMes}">
                                <td th:text="${entry.key}"></td>
                                <td class="text-end fw-bold" th:text="${entry.value + ' €'}"></td>
                            </tr>
                            <tr th:if="${#maps.size(perMes) == 0}">
                                <td colspan="2" class="text-center text-muted py-3">Sense dades</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
