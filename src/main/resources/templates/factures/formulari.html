<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Nova factura - Gestió Fusteria</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>body { background-color: #f5f0eb; }</style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4" style="max-width: 700px;">
    <h2 style="color: #5D4037;">Nova factura</h2>
    <hr>
    <form th:action="@{/factures/nova}" method="post">
        <div class="mb-3">
            <label class="form-label">Client <span class="text-danger">*</span></label>
            <select name="clientId" class="form-select" required>
                <option value="">-- Selecciona un client --</option>
                <option th:each="c : ${clients}" th:value="${c.id}" th:text="${c.nom + ' ' + c.llinatge}"></option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Treballs a incloure <span class="text-danger">*</span></label>
            <div class="border rounded p-3" style="max-height: 200px; overflow-y: auto;">
                <div th:each="t : ${treballs}" class="form-check">
                    <input class="form-check-input" type="checkbox" name="treballIds" th:value="${t.id}" th:id="'treball-' + ${t.id}">
                    <label class="form-check-label" th:for="'treball-' + ${t.id}" th:text="${t.titol + (t.preu != null ? ' (' + t.preu + ' €)' : '')}"></label>
                </div>
                <p th:if="${#lists.isEmpty(treballs)}" class="text-muted mb-0">No hi ha treballs disponibles</p>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Mètode de pagament</label>
            <select name="metodePagament" class="form-select">
                <option value="">-- Selecciona --</option>
                <option value="Transferència bancària">Transferència bancària</option>
                <option value="Efectiu">Efectiu</option>
                <option value="Targeta">Targeta</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Observacions</label>
            <textarea name="observacions" class="form-control" rows="2" placeholder="Observacions addicionals..."></textarea>
        </div>
        <div class="alert alert-info">
            <small>El subtotal, IVA (21%), IRPF (15%) i total es calculen automàticament a partir dels treballs seleccionats.</small>
        </div>
        <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn" style="background-color: #795548; color: white;">Crear factura</button>
            <a th:href="@{/factures}" class="btn btn-outline-secondary">Cancel·lar</a>
        </div>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
