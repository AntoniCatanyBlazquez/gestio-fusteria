<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Clients - Gestió Fusteria</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>body { background-color: #f5f0eb; }</style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 style="color: #5D4037;">Clients</h2>
        <a th:href="@{/clients/nou}" class="btn" style="background-color: #795548; color: white;">+ Nou client</a>
    </div>
    <form method="get" th:action="@{/clients}" class="mb-4">
        <div class="input-group" style="max-width: 400px;">
            <input type="text" name="query" class="form-control" placeholder="Cercar per nom, llinatge o email..." th:value="${query}">
            <button class="btn btn-secondary" type="submit">Cercar</button>
            <a th:href="@{/clients}" class="btn btn-outline-secondary">Netejar</a>
        </div>
    </form>
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead style="background-color: #795548; color: white;">
                    <tr>
                        <th>Nom</th><th>Llinatge</th><th>Identificació</th><th>Telèfon</th><th>Email</th><th>Adreça</th><th>Accions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="client : ${clients}">
                        <td th:text="${client.nom}"></td>
                        <td th:text="${client.llinatge}"></td>
                        <td th:text="${client.tipusIdentificacio != null ? client.tipusIdentificacio + ': ' + client.numeroIdentificacio : '—'}"></td>
                        <td th:text="${client.telefon}"></td>
                        <td th:text="${client.email}"></td>
                        <td th:text="${client.direccio}"></td>
                        <td>
                            <a th:href="@{/clients/{id}/editar(id=${client.id})}" class="btn btn-sm btn-outline-secondary me-1">Editar</a>
                            <form th:action="@{/clients/{id}/eliminar(id=${client.id})}" method="post" style="display:inline;" onsubmit="return confirm('Eliminar aquest client?')">
                                <button type="submit" class="btn btn-sm btn-outline-danger">Eliminar</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(clients)}">
                        <td colspan="6" class="text-center text-muted py-4">No hi ha clients registrats</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
