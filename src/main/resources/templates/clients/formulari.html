<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
    <meta charset="UTF-8">
    <title th:text="${titolPagina} + ' - Gestió Fusteria'">Client</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>body { background-color: #f5f0eb; }</style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4" style="max-width: 600px;">
    <h2 style="color: #5D4037;" th:text="${titolPagina}">Client</h2>
    <hr>
    <form th:action="${client.id != null} ? @{/clients/{id}/editar(id=${client.id})} : @{/clients/nou}" method="post">
        <div class="mb-3">
            <label class="form-label">Nom <span class="text-danger">*</span></label>
            <input type="text" name="nom" class="form-control" required th:value="${client.nom}" placeholder="Nom del client">
        </div>
        <div class="mb-3">
            <label class="form-label">Llinatge <span class="text-danger">*</span></label>
            <input type="text" name="llinatge" class="form-control" required th:value="${client.llinatge}" placeholder="Llinatge del client">
        </div>
        <div class="mb-3">
            <label class="form-label">Telèfon</label>
            <input type="tel" name="telefon" class="form-control" th:value="${client.telefon}" placeholder="Ex: 600 123 456">
        </div>
        <div class="mb-3">
            <label class="form-label">Adreça</label>
            <input type="text" name="direccio" class="form-control" th:value="${client.direccio}" placeholder="Adreça completa">
        </div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" th:value="${client.email}" placeholder="client@email.com">
        </div>
        <div class="mb-3">
            <label class="form-label">Tipus d'identificació</label>
            <select name="tipusIdentificacio" class="form-select">
                <option value="">-- Selecciona --</option>
                <option th:each="t : ${tipusIdentificacions}" th:value="${t}" th:text="${t}"
                        th:selected="${client.tipusIdentificacio == t}"></option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Número d'identificació</label>
            <input type="text" name="numeroIdentificacio" class="form-control" th:value="${client.numeroIdentificacio}" placeholder="Ex: 12345678A">
        </div>
        <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn" style="background-color: #795548; color: white;">Guardar</button>
            <a th:href="@{/clients}" class="btn btn-outline-secondary">Cancel·lar</a>
        </div>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
