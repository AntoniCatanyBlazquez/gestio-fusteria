<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
    <meta charset="UTF-8">
    <title th:text="${titolPagina} + ' - Gestió Fusteria'">Treball</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>body { background-color: #f5f0eb; }</style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4" style="max-width: 650px;">
    <h2 style="color: #5D4037;" th:text="${titolPagina}">Treball</h2>
    <hr>
    <form th:action="${treball.id != null} ? @{/treballs/{id}/editar(id=${treball.id})} : @{/treballs/nou}" method="post">
        <div class="mb-3">
            <label class="form-label">Títol <span class="text-danger">*</span></label>
            <input type="text" name="titol" class="form-control" required th:value="${treball.titol}" placeholder="Ex: Moble de cuina">
        </div>
        <div class="mb-3">
            <label class="form-label">Descripció</label>
            <textarea name="descripcio" class="form-control" rows="3" placeholder="Descripció del treball..." th:text="${treball.descripcio}"></textarea>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Data <span class="text-danger">*</span></label>
                <input type="date" name="data" class="form-control" required th:value="${treball.data}">
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Preu (€)</label>
                <input type="number" name="preu" class="form-control" step="0.01" min="0" th:value="${treball.preu}" placeholder="0.00">
            </div>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Estat</label>
                <select name="estat" class="form-select">
                    <option th:each="e : ${estats}" th:value="${e}" th:text="${e}" th:selected="${e == treball.estat}"></option>
                </select>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Client</label>
                <select name="clientId" class="form-select">
                    <option value="">-- Sense client --</option>
                    <option th:each="c : ${clients}" th:value="${c.id}" th:text="${c.nom + ' ' + c.llinatge}" th:selected="${treball.client != null and treball.client.id == c.id}"></option>
                </select>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Materials</label>
            <textarea name="materials" class="form-control" rows="2" placeholder="Llistat de materials usats..." th:text="${treball.materials}"></textarea>
        </div>
        <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn" style="background-color: #795548; color: white;">Guardar</button>
            <a th:href="@{/treballs}" class="btn btn-outline-secondary">Cancel·lar</a>
        </div>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
